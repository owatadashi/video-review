<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9fb"/>
      <stop offset="100%" style="stop-color:#fafafa"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f4f4f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent top bar -->
  <rect width="1200" height="4" fill="#0891b2"/>

  <!-- Center card -->
  <rect x="160" y="100" width="880" height="430" rx="20" fill="url(#card)" stroke="#e0e0e6" stroke-width="1.5"/>

  <!-- Logo mark -->
  <rect x="540" y="148" width="52" height="52" rx="12" fill="#0891b2"/>
  <text x="566" y="187" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>

  <!-- Brand name -->
  <text x="600" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#0f0f12" text-anchor="middle" letter-spacing="-1">Clippin</text>

  <!-- Tagline -->
  <text x="600" y="308" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif" font-size="24" fill="#6a6a77" text-anchor="middle">動画レビュー・修正指示ツール</text>

  <!-- Divider -->
  <line x1="480" y1="345" x2="720" y2="345" stroke="#e0e0e6" stroke-width="1"/>

  <!-- Feature pills -->
  <rect x="244" y="370" width="200" height="44" rx="22" fill="#eaf5f8" stroke="#b8e0ea" stroke-width="1"/>
  <text x="344" y="397" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', Arial, sans-serif" font-size="18" fill="#0891b2" text-anchor="middle" font-weight="600">タイムコード指示</text>

  <rect x="500" y="370" width="200" height="44" rx="22" fill="#eaf5f8" stroke="#b8e0ea" stroke-width="1"/>
  <text x="600" y="397" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', Arial, sans-serif" font-size="18" fill="#0891b2" text-anchor="middle" font-weight="600">ログイン不要</text>

  <rect x="756" y="370" width="200" height="44" rx="22" fill="#eaf5f8" stroke="#b8e0ea" stroke-width="1"/>
  <text x="856" y="397" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', Arial, sans-serif" font-size="18" fill="#0891b2" text-anchor="middle" font-weight="600">URLで即共有</text>

  <!-- URL -->
  <text x="600" y="488" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" fill="#6a6a77" text-anchor="middle">clippin.work</text>
</svg>
